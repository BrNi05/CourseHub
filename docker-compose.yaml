services:
  backend:
    image: coursehub-backend:latest
    container_name: coursehub_backend_latest
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges=true
    env_file:
      - .env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 5s
    volumes:
          - ./CourseHub-Backend.log:/app/CourseHub-Backend.log
          - ./error-reports:/app/error-reports