<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />

    <!-- Basic -->
    <title>CourseHub</title>

    <meta name="application-name" content="CourseHub" />
    <meta name="description" content="Egyetemi tárgyak, egyszerűen." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#0a1021" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Canonical -->
    <link rel="canonical" href="%SITE_URL%/" />

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="CourseHub" />

    <!-- Open Graph / Facebook / Messenger / Discord / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CourseHub" />
    <meta property="og:locale" content="hu_HU" />

    <meta property="og:title" content="CourseHub" />
    <meta
      property="og:description"
      content="Egyetemi tárgyak, egyszerűen."
    />
    <meta property="og:url" content="%SITE_URL%/" />

    <!-- Social Share Banner -->
    <meta property="og:image" content="%SITE_URL%/og-banner-1200x630.png" />
    <meta
      property="og:image:secure_url"
      content="%SITE_URL%/og-banner-1200x630.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="CourseHub social preview banner"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CourseHub" />
    <meta
      name="twitter:description"
      content="Egyetemi tárgyak, egyszerűen."
    />
    <meta
      name="twitter:image"
      content="%SITE_URL%/og-banner-1200x630.png"
    />
    <meta
      name="twitter:image:alt"
      content="CourseHub social preview banner"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "CourseHub",
        "url": "%SITE_URL%/",
        "description": "Egyetemi tárgyak, egyszerűen."
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
