packages:
  - "."
  - apps/*
  - packages/*

allowBuilds:
  '@nestjs/core': false # funding notice
  '@prisma/engines': true
  '@scarf/scarf': false # logging and analytics
  bcrypt: true
  esbuild: true
  prisma: true

minimumReleaseAge: 1080 # 18 hours

overrides:
  '@hono/node-server@<1.19.13': '>=1.19.13'
  lodash@<=4.17.23: '>=4.18.0'
  lodash@>=4.0.0 <=4.17.23: '>=4.18.0'
  path-to-regexp@>=8.0.0 <8.4.0: '>=8.4.0'
  picomatch@>=4.0.0 <4.0.4: '>=4.0.4'

resolutionMode: highest

injectWorkspacePackages: true
