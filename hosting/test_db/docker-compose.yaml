services:
  postgres:
    image: postgres:latest
    container_name: coursehub_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "10.200.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - coursehub-network
    labels:
      - "dozzle.sigsegv.include=true"

volumes:
  postgres_data:

networks:
  coursehub-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
